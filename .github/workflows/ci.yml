name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # The feature set that represents a normal build plus the crash harness.
  # NOT --all-features: `keyed-hash` is a mutually exclusive build mode, not an additive
  # feature — it deliberately makes an unkeyed store impossible to construct, so it gets
  # its own job below rather than being mixed in here.
  FEATURES: substrate-pager/test-util

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --features $FEATURES -- -D warnings
      - name: clippy (keyed-hash build)
        run: cargo clippy --workspace --all-targets --features substrate-pager/keyed-hash -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets --features $FEATURES
      - name: doc tests
        run: cargo test --workspace --doc

  # The durability gate. This is the one that matters.
  #
  # 10,000 randomized crash-and-recover cycles, killing the write path at a different byte
  # every time. The property: after a crash at ANY byte boundary, the recovered store equals
  # some prefix of committed transactions — no torn state, no lost commit.
  #
  # If this job ever goes red, nothing else in the repository is worth reviewing.
  crash-recovery:
    name: crash recovery (10k cycles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p substrate-wal --release --features $FEATURES --test crash
        env:
          CRASH_RUNS: 10000

  # `keyed-hash` is the CUI build: page identity is keyed, so an adversary who guesses a
  # page's plaintext cannot confirm it, and an unkeyed store cannot be constructed at all.
  # It changes the store's contract, so it is built and tested on its own.
  keyed-hash:
    name: keyed-hash (CUI build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --features substrate-pager/keyed-hash
      - run: cargo test -p substrate-pager --features keyed-hash --lib --test keyed

  # CLAUDE.md rule 5: airgap is a compile-time amputation, not a runtime toggle.
  # This job proves it by running the suite with no route to the outside world.
  # A test that needs the network to pass is a test that fails.
  no-egress:
    name: no-egress (airgap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Vendor dependencies (network available)
        run: |
          mkdir -p .cargo
          cargo vendor vendor > vendor-config.toml
          cat vendor-config.toml >> .cargo/config.toml

      # The amputation, proven by inspecting the artifact (rule 5): with substrate-store built
      # `--no-default-features`, object_store carries NO cloud backend — no aws/gcp/azure/http client is
      # compiled in. This is the real removal, not the marker: the `remote` feature (on by default) is
      # the only thing that pulls the S3 client, and it is absent here.
      - name: Prove the airgap build links no object-storage network client
        run: |
          set -euo pipefail
          echo "substrate-store airgap object_store features:"
          cargo tree -p substrate-store --no-default-features -e features -i object_store || true
          if cargo tree -p substrate-store --no-default-features -e features -i object_store \
               | grep -iE 'feature "(aws|gcp|azure|http|cloud)"'; then
            echo "::error::airgap amputation FAILED — object_store still has a cloud/network backend under --no-default-features."
            exit 1
          fi
          cargo build -p substrate-store --no-default-features
          echo "OK: the air-gap build of substrate-store has no object-storage network client."

      - name: Run the suite with no network namespace at all
        run: |
          docker run --rm --network none \
            -v "$PWD":/w -w /w \
            -e CARGO_TERM_COLOR=always \
            -e CARGO_HOME=/w/.cargo-home \
            rust:1-slim \
            cargo test --workspace --offline \
              --features substrate-pager/airgap,substrate-wal/airgap,substrate-store/airgap,substrate-security/airgap,substrate-pager/test-util

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources

  fuzz:
    name: fuzz (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      # A short run on every push. The point is not to find bugs in 60 seconds — it is to
      # guarantee the target still BUILDS and still runs, so that a format change cannot
      # quietly leave the fuzzer testing last week's format while reporting green.
      - run: cargo fuzz run --fuzz-dir testing/fuzz pager_ops -- -max_total_time=60
